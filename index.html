<!DOCTYPE html>
<html>
<head>
<title>Make a Wish</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:white;
font-family:sans-serif;
}

/* kue 3D */
.cake{
position:relative;
width:220px;
height:120px;
background:linear-gradient(#ffb6c1,#ff8fab);
border-radius:15px;
box-shadow:0 15px 25px rgba(0,0,0,0.2);
}

/* layer atas */
.cake:before{
content:"";
position:absolute;
top:-30px;
width:220px;
height:60px;
background:#ffd6e0;
border-radius:50%;
}

/* lilin */
.candle{
position:absolute;
top:-80px;
left:50%;
transform:translateX(-50%);
width:12px;
height:80px;
background:white;
border-radius:4px;
animation:sway 2s infinite ease-in-out;
}

/* api */
.flame{
position:absolute;
top:-20px;
left:-6px;
width:24px;
height:30px;
background:radial-gradient(circle,#fff,#ffcc00,#ff6a00);
border-radius:50%;
animation:flicker 0.15s infinite;
}

/* animasi goyang lilin */
@keyframes sway{
0%{transform:translateX(-50%) rotate(-2deg)}
50%{transform:translateX(-50%) rotate(2deg)}
100%{transform:translateX(-50%) rotate(-2deg)}
}

/* animasi api */
@keyframes flicker{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(0.95)}
}

h1{
margin-top:120px;
font-size:28px;
}

</style>
</head>

<body>

<div class="cake">
<div class="candle">
<div class="flame"></div>
</div>
</div>

<h1>Make a wish… lalu tiup lilinnya 🎂</h1>

</body>
</html>
