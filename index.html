<!DOCTYPE html>
<html>
<head>
<title>Make a Wish</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:white;
font-family:sans-serif;
}

/* kue */
.cake{
position:relative;
width:260px;
height:140px;
background:linear-gradient(#ff9eb5,#ff7a9a);
border-radius:15px;
box-shadow:0 20px 30px rgba(0,0,0,0.15);
}

/* bagian atas kue */
.cake::before{
content:"";
position:absolute;
top:-35px;
left:0;
width:260px;
height:70px;
background:#ffd6e0;
border-radius:50%;
}

/* lilin */
.candle{
position:absolute;
top:-70px;
left:50%;
transform:translateX(-50%);
width:12px;
height:60px;
background:white;
border-radius:4px;
animation:sway 2s infinite ease-in-out;
}

/* api */
.flame{
position:absolute;
top:-22px;
left:-6px;
width:22px;
height:28px;
background:radial-gradient(circle,#fff,#ffc400,#ff6a00);
border-radius:50%;
animation:flicker .15s infinite;
box-shadow:0 0 20px #ffb300;
}

/* animasi lilin goyang */
@keyframes sway{
0%{transform:translateX(-50%) rotate(-3deg)}
50%{transform:translateX(-50%) rotate(3deg)}
100%{transform:translateX(-50%) rotate(-3deg)}
}

/* animasi api */
@keyframes flicker{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(0.9)}
}

h1{
margin-top:120px;
font-size:26px;
color:#333;
}

</style>
</head>

<body>

<div class="cake">
<div class="candle">
<div class="flame"></div>
</div>
</div>

<h1>Make a wish… lalu tiup lilinnya 🎂</h1>

</body>
</html>
