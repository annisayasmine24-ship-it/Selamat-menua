<!DOCTYPE html>
<html>
<head>
<title>Make a Wish</title>

<style>

body{
background:#0f0f0f;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:sans-serif;
color:white;
overflow:hidden;
}

/* kue */
.cake{
font-size:160px;
}

/* lilin */
.candle{
width:20px;
height:120px;
background:white;
border-radius:4px;
position:relative;
margin-top:-60px;
}

/* api */
.flame{
width:25px;
height:40px;
background:radial-gradient(circle,#ffd000,#ff6a00);
border-radius:50%;
position:absolute;
top:-35px;
left:-3px;
animation:flicker 0.15s infinite;
filter:blur(0.5px);
}

/* animasi api */
@keyframes flicker{

0%{transform:scale(1) rotate(-1deg);}
25%{transform:scale(1.1) rotate(1deg);}
50%{transform:scale(0.95) rotate(-1deg);}
75%{transform:scale(1.05) rotate(2deg);}
100%{transform:scale(1) rotate(-1deg);}

}

h1{
margin-top:40px;
font-size:28px;
letter-spacing:2px;
}

button{
margin-top:40px;
padding:14px 28px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:#ffffff;
color:#111;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="cake">🎂</div>

<div class="candle">
<div id="flame" class="flame"></div>
</div>

<h1>Make a wish… lalu tiup lilinnya</h1>

<div id="next" class="hidden">
<button onclick="location.href='page2.html'">
Lanjut →
</button>
</div>

<script>

/* deteksi tiupan mic */

navigator.mediaDevices.getUserMedia({audio:true})
.then(function(stream){

const audioContext = new AudioContext();
const mic = audioContext.createMediaStreamSource(stream);
const analyser = audioContext.createAnalyser();

mic.connect(analyser);

const data = new Uint8Array(analyser.frequencyBinCount);

function detect(){

analyser.getByteFrequencyData(data);

let volume = data.reduce((a,b)=>a+b)/data.length;

if(volume>60){

document.getElementById("flame").style.display="none";
document.getElementById("next").classList.remove("hidden");

}

requestAnimationFrame(detect);
}

detect();

});

</script>

</body>
</html>
